<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Calculator</h1>
    <div class="container">
        <div class="con1">
             <div class="displayer">Ans</div>
        </div>
    <div class="con2">
    <button class="box operand" id="7">7</button>
    <button class="box operand" id="8">8</button>
    <button class="box operand" id="9">9</button>
    <button class="box operator" id="/" >/</button>
    <button class="box operator" id="*">X</button>
    <button class="box operand" id="4">4</button>
    <button class="box operand" id="5">5</button>
    <button class="box operand" id="6">6</button>
    <button class="box operator" id="+">+</button>
    <button class="box operator" id="-">-</button>
    <button class="box operand" id="1">1</button>
    <button class="box operand" id="2">2</button>
    <button class="box operand" id="3">3</button>
    <button class="box operator" id="**">^</button>
    <button class="box "  id="AC">AC</button>
    <button class="box operator" id="%">%</button>
    <button class="box operand" id="0">0</button>
    <button class="box operand" id=".">.</button>
    <button class="box  DEL" >DEL</button>
    <button class="box answer" id="=">=</button>
     </div>
    
    </div>
   

     <script src="script.js"></script>
</body>
</html>
